<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3362fc"/>
      <stop offset="100%" style="stop-color:#1530de"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Calendar body -->
  <rect x="96" y="152" width="320" height="264" rx="24" ry="24" fill="#ffffff" opacity="0.95"/>
  <!-- Calendar top bar -->
  <rect x="96" y="152" width="320" height="72" rx="24" ry="24" fill="#ffffff"/>
  <rect x="96" y="200" width="320" height="24" fill="#ffffff"/>
  <!-- Top bar accent -->
  <rect x="96" y="152" width="320" height="72" rx="24" ry="24" fill="#eef4ff"/>
  <rect x="96" y="200" width="320" height="24" fill="#eef4ff"/>
  <!-- Calendar pins -->
  <rect x="176" y="120" width="16" height="64" rx="8" fill="#ffffff"/>
  <rect x="320" y="120" width="16" height="64" rx="8" fill="#ffffff"/>
  <!-- Grid lines -->
  <line x1="96" y1="224" x2="416" y2="224" stroke="#d9e5ff" stroke-width="2"/>
  <line x1="96" y1="280" x2="416" y2="280" stroke="#d9e5ff" stroke-width="2"/>
  <line x1="96" y1="336" x2="416" y2="336" stroke="#d9e5ff" stroke-width="2"/>
  <line x1="203" y1="224" x2="203" y2="416" stroke="#d9e5ff" stroke-width="2"/>
  <line x1="310" y1="224" x2="310" y2="416" stroke="#d9e5ff" stroke-width="2"/>
  <!-- Today highlight -->
  <circle cx="256" cy="310" r="28" fill="#3362fc"/>
  <text x="256" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff">15</text>
  <!-- Other dates -->
  <text x="150" y="262" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#6b7280">8</text>
  <text x="256" y="262" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#6b7280">9</text>
  <text x="363" y="262" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#6b7280">10</text>
  <text x="150" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#6b7280">14</text>
  <text x="363" y="318" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#6b7280">16</text>
  <text x="150" y="374" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#6b7280">21</text>
  <text x="256" y="374" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#6b7280">22</text>
  <text x="363" y="374" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#6b7280">23</text>
  <!-- Event dot -->
  <circle cx="150" cy="340" r="4" fill="#3362fc"/>
  <circle cx="363" cy="284" r="4" fill="#dc2626"/>
</svg>
